{% extends "base.html" %}
{% block title %}New Mediation — BridgeSpace{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto">
  <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:0.25rem">{{ t.start_new_mediation }}</h1>
  <p class="text-muted text-sm" style="margin-bottom:2rem">{{ t.you_will_be_mediator }}</p>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>{{ t.title_label }}</label>
        <input type="text" name="title" placeholder="{{ t.title_placeholder_workplace }}" required>
      </div>
      <div class="form-group">
        <label>{{ t.description_label }}</label>
        <textarea name="description" placeholder="{{ t.description_placeholder_optional }}"></textarea>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:0.75rem">
        <input type="checkbox" name="is_live" id="is_live" style="width:auto">
        <label for="is_live" style="margin:0;font-size:0.9rem;color:var(--charcoal)">{{ t.live_session_label }}</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center">
        {{ t.create_mediation_submit }}
      </button>
    </form>
  </div>
</div>
{% endblock %}
