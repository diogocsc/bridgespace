{% extends "base.html" %}
{% block title %}Set New Password – BridgeSpace{% endblock %}

{% block head %}
<style>
  .auth-wrap { max-width: 440px; margin: 0 auto; }
  .auth-hero { text-align: center; margin-bottom: 2rem; }
  .auth-hero h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; margin-bottom: .4rem; }
  .auth-hero p  { color: var(--muted); font-size: .95rem; }
  .pw-wrap { position: relative; }
  .pw-wrap input { padding-right: 3rem; }
  .pw-toggle { position: absolute; right: .8rem; top: 50%; transform: translateY(-50%);
               background: none; border: none; cursor: pointer; color: var(--muted);
               font-size: .85rem; padding: 0; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-hero">
    <h1>Set new password</h1>
    <p>Choose a strong password of at least 8 characters.</p>
  </div>

  <div class="card">
    <form method="POST"
          action="{{ url_for('auth.reset_password', token=token) }}"
          novalidate>

      <div class="form-group">
        <label for="password">New password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password"
                 placeholder="At least 8 characters"
                 required minlength="8" autofocus>
          <button type="button" class="pw-toggle" onclick="togglePw('password','eye1')">
            <span id="eye1">&#128065;</span>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm new password</label>
        <div class="pw-wrap">
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="Repeat new password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('confirm_password','eye2')">
            <span id="eye2">&#128065;</span>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary"
              style="width:100%;justify-content:center;">
        Update password
      </button>
    </form>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(fieldId, eyeId) {
  const inp = document.getElementById(fieldId);
  const eye = document.getElementById(eyeId);
  if (inp.type === 'password') { inp.type = 'text';     eye.innerHTML = '&#128584;'; }
  else                         { inp.type = 'password'; eye.innerHTML = '&#128065;'; }
}
</script>
{% endblock %}
