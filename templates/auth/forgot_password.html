{% extends "base.html" %}
{% block title %}Forgot Password – BridgeSpace{% endblock %}

{% block head %}
<style>
  .auth-wrap { max-width: 440px; margin: 0 auto; }
  .auth-hero { text-align: center; margin-bottom: 2rem; }
  .auth-hero h1 { font-family: 'Playfair Display', serif; font-size: 1.9rem; margin-bottom: .4rem; }
  .auth-hero p  { color: var(--muted); font-size: .95rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-hero">
    <h1>Reset your password</h1>
    <p>Enter your registered email and we will send you a reset link.</p>
  </div>

  <div class="card">
    <form method="POST" action="{{ url_for('auth.forgot_password') }}" novalidate>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com"
               value="{{ request.form.get('email', '') }}"
               required autofocus>
      </div>
      <button type="submit" class="btn btn-primary"
              style="width:100%;justify-content:center;">
        Send reset link
      </button>
    </form>

    <p class="text-sm text-muted mt-2" style="text-align:center;">
      Remembered it?
      <a href="{{ url_for('auth.login') }}">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
